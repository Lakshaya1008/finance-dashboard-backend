# ===============================
# SERVER
# ===============================
server.port=8081

# ===============================
# DATABASE (H2 - local dev)
# ===============================
spring.datasource.url=jdbc:h2:mem:financedb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# ===============================
# H2 CONSOLE (dev only - enabled here)
# ===============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# JWT
# ===============================
jwt.secret=your_super_secret_key_which_is_at_least_256_bits_long_change_before_production
jwt.expiration=86400000

# ===============================
# PAGINATION DEFAULTS
# ===============================
spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=50