# ===============================
# SERVER
# ===============================
server.port=${SERVER_PORT:8081}

# ===============================
# DATABASE (MySQL - production)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/fintech_db?useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=10000&socketTimeout=30000&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# ===============================
# HIKARI CONNECTION POOL
# ===============================
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000

# ===============================
# H2 CONSOLE (dev only)
# ===============================
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET:change-me-in-production-256-bit-minimum-secret-key}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===============================
# PAGINATION DEFAULTS
# ===============================
spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=50